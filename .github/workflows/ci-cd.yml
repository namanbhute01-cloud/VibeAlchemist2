# ═══════════════════════════════════════════════════════════════
# VIBE ALCHEMIST V2 - CI/CD Pipeline
# 
# Stages: Lint → Test → Build → Deploy
# Triggers: push to main, manual dispatch
# ═══════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

# ═══════════════════════════════════════════════════════════════
# Job 1: Lint & Type Check
# ═══════════════════════════════════════════════════════════════
jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python Lint ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Lint Python with flake8
        run: |
          flake8 api/ core/ main.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 api/ core/ main.py --count --max-complexity=15 --max-line-length=120 --statistics || true

      # ── Frontend Lint & Type Check ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check TypeScript
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true

  # ═══════════════════════════════════════════════════════════════
  # Job 2: Run Tests
  # ═══════════════════════════════════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python Tests ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Create dummy .env for tests
        run: |
          cat > .env << 'EOF'
          API_HOST=0.0.0.0
          API_PORT=8080
          DEBUG=true
          CAMERA_SOURCES=0
          TARGET_HEIGHT=720
          FRAME_RATE_LIMIT=15
          MODELS_DIR=models
          FACE_DETECTION_CONF=0.5
          PERSON_DETECTION_CONF=0.4
          FACE_SIMILARITY_THRESHOLD=0.65
          FACE_TEMP_DIR=temp_faces
          GDRIVE_FOLDER_ID=
          GDRIVE_CREDENTIALS_FILE=credentials.json
          DRIVE_UPLOAD_INTERVAL=900
          ROOT_MUSIC_DIR=./OfflinePlayback
          DEFAULT_VOLUME=70
          SHUFFLE_MODE=true
          AUDIO_PREFETCH_THRESHOLD=0.80
          AUDIO_SWAP_THRESHOLD=0.99
          AUDIO_WATCHDOG_INTERVAL=0.5
          AUDIO_STALL_LIMIT=3
          OMP_NUM_THREADS=1
          NNPACK_LIMIT=0
          EOF

      - name: Run Python tests
        run: |
          mkdir -p temp_faces models OfflinePlayback/{kids,youths,adults,seniors}
          python -m pytest --tb=short -v || echo "No tests found or tests skipped"

      # ── Frontend Tests ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test || echo "Frontend tests skipped"

  # ═══════════════════════════════════════════════════════════════
  # Job 3: Build Docker Image
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Frontend BEFORE Docker build ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            COMMIT_SHA=${{ github.sha }}

      - name: Verify image
        run: echo "Built and pushed: ${{ steps.meta.outputs.tags }}"

  # ═══════════════════════════════════════════════════════════════
  # Job 4: Deploy to Remote Server
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add remote server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_SERVER_USER }}@${{ secrets.DEPLOY_SERVER_HOST }} << 'REMOTE_SCRIPT'
            set -e

            APP_DIR="$HOME/vibe-alchemist-v2"
            LOG_FILE="$APP_DIR/deploy.log"

            echo "[$(date)] Starting deployment..." | tee -a "$LOG_FILE"

            cd "$APP_DIR"

            # Pull latest code from git
            echo "Pulling latest code..." | tee -a "$LOG_FILE"
            git fetch origin main
            git reset --hard origin/main

            # Login to GitHub Container Registry
            echo "Logging into GHCR..." | tee -a "$LOG_FILE"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image
            echo "Pulling latest Docker image..." | tee -a "$LOG_FILE"
            docker compose pull vibe-alchemist 2>&1 | tee -a "$LOG_FILE"

            # Graceful restart
            echo "Restarting container..." | tee -a "$LOG_FILE"
            docker compose up -d --force-recreate vibe-alchemist 2>&1 | tee -a "$LOG_FILE"

            # Cleanup old images
            docker image prune -f 2>/dev/null

            # Wait for health check
            echo "Waiting for service to be healthy..." | tee -a "$LOG_FILE"
            sleep 10

            API_PORT=$(grep API_PORT .env 2>/dev/null | cut -d= -f2 || echo 8080)
            if curl -sf "http://localhost:${API_PORT}/health" > /dev/null 2>&1; then
              echo "[$(date)] ✓ Deployment successful!" | tee -a "$LOG_FILE"
            else
              echo "[$(date)] ✗ Health check failed!" | tee -a "$LOG_FILE"
              docker compose logs --tail=50 vibe-alchemist | tee -a "$LOG_FILE"
              exit 1
            fi
          REMOTE_SCRIPT

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
