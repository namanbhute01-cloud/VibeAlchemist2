# ═══════════════════════════════════════════════════════════════
# VIBE ALCHEMIST V2 - Docker Compose Configuration
#
# Designed to run alongside HRMS server (port 5000)
# Vibe Alchemist uses port 8081 by default (set API_PORT in .env)
#
# Usage:
#   docker compose up -d          # Start
#   docker compose down           # Stop
#   docker compose logs -f        # View logs
#   docker compose ps             # Status
# ═══════════════════════════════════════════════════════════════

services:
  vibe-alchemist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vibe-alchemist-v2
    restart: unless-stopped

    # ── Port Mapping ──
    # Host port is controlled by API_PORT in .env (default: 8000)
    # Container always listens on 8000 internally
    # This avoids conflict with HRMS on port 5000
    ports:
      - "${API_PORT:-8000}:8000"

    # ── Environment ──
    # Load all variables from .env file
    env_file:
      - path: .env
        required: false  # Won't fail if .env is missing (uses defaults)

    environment:
      # Core - override from .env via env_file above
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=8000  # Internal container port (always 8000)
      - DEBUG=${DEBUG:-false}

      # Camera
      - CAMERA_SOURCES=${CAMERA_SOURCES:-0}
      - TARGET_HEIGHT=${TARGET_HEIGHT:-720}
      - FRAME_RATE_LIMIT=${FRAME_RATE_LIMIT:-15}

      # Vision
      - FACE_DETECTION_CONF=${FACE_DETECTION_CONF:-0.5}
      - PERSON_DETECTION_CONF=${PERSON_DETECTION_CONF:-0.4}
      - FACE_SIMILARITY_THRESHOLD=${FACE_SIMILARITY_THRESHOLD:-0.65}

      # Storage
      - FACE_TEMP_DIR=/app/temp_faces
      - GDRIVE_FOLDER_ID=${GDRIVE_FOLDER_ID:-}
      - GDRIVE_CREDENTIALS_FILE=${GDRIVE_CREDENTIALS_FILE:-credentials.json}
      - DRIVE_UPLOAD_INTERVAL=${DRIVE_UPLOAD_INTERVAL:-900}

      # Music
      - ROOT_MUSIC_DIR=/app/OfflinePlayback
      - DEFAULT_VOLUME=${DEFAULT_VOLUME:-70}
      - SHUFFLE_MODE=${SHUFFLE_MODE:-true}

      # UI Settings
      - AUTO_PLAYLIST=${AUTO_PLAYLIST:-true}
      - FACE_OVERLAY=${FACE_OVERLAY:-true}
      - PRIVACY_MODE=${PRIVACY_MODE:-false}

      # Performance
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - NNPACK_LIMIT=${NNPACK_LIMIT:-0}

    # ── Volumes ──
    volumes:
      # Persist face temp data across restarts
      - vibe_temp_faces:/app/temp_faces

      # Music directory - READ/WRITE so uploaded songs persist
      - ./OfflinePlayback:/app/OfflinePlayback

      # Models are baked into the Docker image (not mounted from host)
      # If you need custom models, mount them explicitly:
      # - ./models:/app/models:ro

      # Logs
      - ./logs:/app/logs

      # .env file - mount read-only so container can read but not modify it
      - ./.env:/app/.env:ro

    # ── Resource Limits ──
    # Prevents Vibe Alchemist from starving the HRMS server
    # Increased from 2G to 3G to accommodate ML model loading (YOLO + InsightFace + ONNX)
    deploy:
      resources:
        limits:
          cpus: '2.5'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M

    # ── Logging ──
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # ── Network ──
    networks:
      - vibe-network

    # ── Health Check ──
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

# ── Named Volumes ──
volumes:
  vibe_temp_faces:
    driver: local

# ── Network ──
networks:
  vibe-network:
    driver: bridge
